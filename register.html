<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Register</title>

<link rel="stylesheet"
href="style.css">

</head>

<body>

<div class="hero">

<div class="booking-box">

<h2>
📝 User Registration
</h2>

<br>

<form>

<input type="text"
id="name"
placeholder="Full Name"
required>

<input type="email"
id="email"
placeholder="Email Address"
required>

<input type="password"
id="password"
placeholder="Password"
required>

<input type="tel"
id="mobile"
placeholder="Mobile Number"
required>

<br><br>

<button type="button"
onclick="registerUser()">

Register

</button>

</form>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
    getDatabase,
    ref,
    set
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

const firebaseConfig = {

    apiKey: "AIzaSyCz6_Gs8LAtiuubStscVOE6RWxvLcYIXTA",
    authDomain: "railway-reservation-ad681.firebaseapp.com",
    databaseURL: "https://railway-reservation-ad681-default-rtdb.firebaseio.com/",
    projectId: "railway-reservation-ad681",
    storageBucket: "railway-reservation-ad681.firebasestorage.app",
    messagingSenderId: "182802448874",
    appId: "1:182802448874:web:322064ebe5b217d51b3293"

};

const app = initializeApp(firebaseConfig);
const database = getDatabase(app);

window.registerUser = function(){

    let name = document.getElementById("name").value;
    let email = document.getElementById("email").value;
    let mobile = document.getElementById("mobile").value;
    set(ref(database, "users/" + mobile), {

    name: name,
    email: email,
    mobile: mobile,

    train: localStorage.getItem("trainName") || "",
    fromStation: localStorage.getItem("fromStation") || "",
    toStation: localStorage.getItem("toStation") || "",
    seatNumber: localStorage.getItem("seatNumber") || "",
    amount: localStorage.getItem("amount") || "",
    trainType: localStorage.getItem("trainType") || ""

    

    }).then(() => {

        localStorage.setItem(
            "passengerName",
            name
        );
        localStorage.setItem(
    "mobile",
    mobile
);

        alert("Registration Successful ✅");

        window.location.href =
        "booking.html";

    }).catch((error) => {

        alert("Error: " + error.message);

    });

}

</script>

</body>

</html>
