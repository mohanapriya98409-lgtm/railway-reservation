    href="style.css">

    rel="stylesheet">

</head>

<body>

            🚆 IRCTC Railway

            <li>
                <a href="register.html">

            <li>
                <a href="booking.html">

                </a>

            <li>

                 <a href="cancel.html">

            <li>

                </a>

        </ul>

    </nav>

    <!-- HERO -->

    <section class="hero">

        <div class="overlay"></div>

        <div class="main-content">

            <!-- LEFT -->

            <div class="left">

                <h1>
                    BOOK TRAIN TICKETS ONLINE
                </h1>

                <p>
                    Easy railway ticket booking system
                    with seat availability, waiting list,
                    cancellation and PDF ticket.
                </p>

            </div>

            <!-- RIGHT BOOKING BOX -->

            <div class="booking-box">

                <h2>
                    Quick Book
                </h2>

                <form id="bookingForm">
<form id="bookingForm">

    <select id="from" required>

        <option value="">From Station</option>

        <option>Chennai</option>
        <option>Madurai</option>
        <option>Coimbatore</option>
        <option>Trichy</option>
        <option>Salem</option>
        <option>Erode</option>
        <option>Tirunelveli</option>
        <option>Thoothukudi</option>

    </select>

    <select id="to" required>

        <option value="">To Station</option>

        <option>Chennai</option>
        <option>Madurai</option>
        <option>Coimbatore</option>
        <option>Trichy</option>
        <option>Salem</option>
        <option>Erode</option>
        <option>Tirunelveli</option>
        <option>Thoothukudi</option>

    </select>

    <input type="date"
    id="date"
    required>
                    

                

                    <select id="class">

                        <option>
                            Sleeper Class
                        </option>

                        <option>
                            AC Class
                        </option>

                        <option>
                            First Class
                        </option>

                    </select>

                    <!-- RADIO BUTTONS -->

                    <div class="radio-box">

                        <label>

                            <input type="radio"
                            name="ticket"
                            checked>

                            General

                        </label>

                        <label>

                            <input type="radio"
                            name="ticket">

                            Tatkal

                        </label>

                    </div>

                    <!-- BUTTON -->

                    <button type="button"
                    onclick="goBooking()">

                        SEARCH TRAIN

                    </button>

                </form>

            </div>

        </div>

    </section>

    <!-- SCRIPT -->

    <script>

        function goBooking(){

localStorage.setItem(
"fromStation",
document.getElementById("from").value
);

localStorage.setItem(
"toStation",
document.getElementById("to").value
);

localStorage.setItem(
"journeyDate",
document.getElementById("date").value
);
localStorage.setItem(
"trainType",
"Express"
);

localStorage.setItem(
"amount",
"650"
);
window.location.href =
"booking.html";

}


    </script>
