<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Seat Selection</title>

<link rel="stylesheet"
href="style.css">

<style>

.seat-container{

display:grid;
grid-template-columns:repeat(4,80px);
gap:15px;
justify-content:center;
margin-top:20px;

}

.seat{

width:80px;
height:80px;
background:green;
color:white;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
transition:0.3s;

}

.seat:hover{

transform:scale(1.1);

}

.booked{

background:red;
cursor:not-allowed;

}

.selected{

background:orange;

}

</style>

</head>

<body>

<div class="hero">

<div class="booking-box">

<h2>
💺 Select Your Seat
</h2>
<p style="color:white;">TEST SEAT PAGE</p>

<br>

<div class="train-layout">
<div class="berth-group">

<button class="seat">LB</button>
<button class="seat">MB</button>
<button class="seat">UB</button>

</div>

<div class="side-berth">

<button class="seat">SL</button>
<button class="seat booked">SU</button>

</div>

<div class="berth-group">

<button class="seat">LB</button>
<button class="seat booked">MB</button>
<button class="seat">UB</button>

</div>

<div class="side-berth">

<button class="seat">SL</button>
<button class="seat">SU</button>

</div>
</div>

<br><br>

<button type="button"
onclick="continueBooking()">

Continue Booking

</button>

</div>

</div>

<script>

const seats =
document.querySelectorAll(".seat");

seats.forEach(seat => {

seat.addEventListener("click", () => {

if(seat.classList.contains("booked")){

alert("Seat Already Booked ❌");

return;

}

document.querySelectorAll(".seat")
.forEach(s => s.classList.remove("selected"));

seat.classList.add("selected");

alert(seat.innerText + " Selected ✅");

});

});

function continueBooking(){

const selectedSeat =
document.querySelector(".seat.selected");

if(!selectedSeat){
    alert("Please select a seat ❌");
    return;
}

localStorage.setItem(
    "seatNumber",
    selectedSeat.innerText
);

window.location.href =
"waitlist.html";
}


</script>

</body>

</html>
